<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relativistic Billiards</title>
<style>
/* ── Reset & Layout ─────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #eee;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}
h1 {
  margin: 10px 0 4px;
  font-size: 1.4rem;
  letter-spacing: 2px;
  color: #e0c097;
}
#ui-bar {
  display: flex;
  gap: 18px;
  align-items: center;
  margin-bottom: 6px;
  font-size: 0.82rem;
}
#ui-bar label { color: #aaa; }
#ui-bar .val { color: #f0d080; font-weight: bold; }
canvas {
  border: 3px solid #3a3a5c;
  border-radius: 8px;
  cursor: crosshair;
  display: block;
  max-width: 95vw;
  max-height: 70vh;
  width: 100%;
  object-fit: contain;
}
#hud {
  margin-top: 6px;
  font-size: 0.78rem;
  color: #888;
  text-align: center;
  max-width: 820px;
  line-height: 1.5;
}
#hud .key { color: #e0c097; }
#info-panel {
  margin-top: 4px;
  font-size: 0.75rem;
  color: #666;
  text-align: center;
}
button {
  background: #3a3a5c;
  color: #eee;
  border: 1px solid #555;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.8rem;
}
button:hover { background: #50507a; }
</style>
</head>
<body>
<h1>&#9733; Relativistic Billiards &#9733;</h1>
<div id="ui-bar">
  <label>c (speed of light):
    <input type="range" id="slider-c" min="100" max="1500" value="400">
    <span class="val" id="val-c">400</span> px/s
  </label>
  <button id="btn-reset">Reset Table</button>
  <label>Show contraction: <input type="checkbox" id="chk-contraction" checked></label>
  <label>Doppler color: <input type="checkbox" id="chk-doppler" checked></label>
  <label>Spacetime Grid: <input type="checkbox" id="chk-grid" checked></label>
  <label>Bullet Time: <input type="checkbox" id="chk-bullet"></label>
</div>
<canvas id="game"></canvas>
<div id="hud">
  <span class="key">Click &amp; drag</span> the cue ball to aim &amp; set power &middot;
  <span class="key">Release</span> to shoot &middot;
  <span class="key">Scroll</span> over slider to change <em>c</em> &middot;
  Balls obey <span class="key">Special Relativity</span>: length contraction, relativistic momentum &amp; collisions
</div>
<div id="info-panel" id="info-panel"></div>

<script>
/* ================================================================
   RELATIVISTIC BILLIARDS – single-file prototype
   No external libraries. Pure Canvas + Vanilla JS.
   All ball dynamics use Special Relativity:
     • γ = 1/√(1 − v²/c²)
     • Relativistic momentum p = γ m v
     • Relativistic kinetic energy K = (γ−1) m c²
     • 1-D relativistic velocity addition for collisions
     • Visual length contraction & simplified Doppler hue shift
   ================================================================ */

"use strict";

// ── DOM refs ──────────────────────────────────────────────
const canvas  = document.getElementById("game");
const ctx     = canvas.getContext("2d");
const sliderC = document.getElementById("slider-c");
const valC    = document.getElementById("val-c");
const btnReset      = document.getElementById("btn-reset");
const chkContraction = document.getElementById("chk-contraction");
const chkDoppler     = document.getElementById("chk-doppler");
const chkGrid        = document.getElementById("chk-grid");
const chkBullet      = document.getElementById("chk-bullet");
const infoPanel      = document.getElementById("info-panel");

// ── Constants & Config ────────────────────────────────────
const TABLE_W = 1600;
const TABLE_H = 800;
const CUSHION  = 56;           // border cushion thickness
const POCKET_R = 36;           // pocket radius
const BALL_R   = 22;           // rest-frame ball radius
const FRICTION = 0.05;         // deceleration (px/s²)
const RESTITUTION = 0.96;      // coefficient of restitution for walls
const MIN_SPEED = 1;           // below this, ball stops
const GRAVITY_G = 15000;       // dynamic gravity coupling constant
const SPIN_TRANSFER = 2.0;    // fraction of tangential velocity transferred to spin
const MAGNUS_K = 0.01;        // Magnus effect strength (rotation angle per unit omega per second)
const SPIN_FRICTION = 0.5;    // spin decay rate (only when moving)

canvas.width  = TABLE_W;
canvas.height = TABLE_H;

let C = 400;  // speed of light in px/s (tuneable)
let timeScale = 1.0;  // bullet-time multiplier (1.0 = normal)

// ── Vector helpers ────────────────────────────────────────
const Vec = {
  add(a, b)    { return { x: a.x + b.x, y: a.y + b.y }; },
  sub(a, b)    { return { x: a.x - b.x, y: a.y - b.y }; },
  scale(v, s)  { return { x: v.x * s, y: v.y * s }; },
  dot(a, b)    { return a.x * b.x + a.y * b.y; },
  len(v)       { return Math.sqrt(v.x * v.x + v.y * v.y); },
  norm(v)      { const l = Vec.len(v); return l > 0 ? { x: v.x / l, y: v.y / l } : { x: 0, y: 0 }; },
  rot(v, a)    { const c = Math.cos(a), s = Math.sin(a); return { x: v.x * c - v.y * s, y: v.x * s + v.y * c }; },
};

// ── Relativity helpers ────────────────────────────────────
function gamma(speed) {
  const beta2 = (speed * speed) / (C * C);
  if (beta2 >= 1) return 1e6;         // cap for safety
  return 1 / Math.sqrt(1 - beta2);
}

/** Clamp speed strictly below c */
function clampSpeed(speed) {
  return Math.min(speed, C * 0.9999);
}

/**
 * Relativistic 1-D velocity addition:
 *   u' = (u + v) / (1 + u*v / c²)
 * Used after boosting into the CoM frame.
 */
function relVelAdd(u, v) {
  return (u + v) / (1 + (u * v) / (C * C));
}

// ── Ball class ────────────────────────────────────────────
class Ball {
  constructor(x, y, color, number, mass) {
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.r  = BALL_R;
    this.color = color;
    this.baseHue = 0;          // computed from color for Doppler
    this.number = number;      // 0 = cue ball
    this.mass = mass || 1;
    this.active = true;        // false when pocketed
    this.history = [];         // trail of past positions
    this.omega = 0;            // angular velocity (spin)
    this.theta = 0;            // rotation angle
    this._parseHue();
  }

  _parseHue() {
    // extract approximate hue for Doppler shift
    const tmp = document.createElement("canvas").getContext("2d");
    tmp.fillStyle = this.color;
    const hex = tmp.fillStyle;  // normalised to #rrggbb
    const r = parseInt(hex.slice(1, 3), 16) / 255;
    const g = parseInt(hex.slice(3, 5), 16) / 255;
    const b = parseInt(hex.slice(5, 7), 16) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h = 0;
    if (max !== min) {
      const d = max - min;
      if (max === r) h = ((g - b) / d + 6) % 6;
      else if (max === g) h = (b - r) / d + 2;
      else h = (r - g) / d + 4;
      h *= 60;
    }
    this.baseHue = h;
    this.baseSat = (max === 0) ? 0 : ((max - min) / max) * 100;
    this.baseVal = max * 100;
  }

  speed() { return Vec.len({ x: this.vx, y: this.vy }); }

  /** Relativistic momentum magnitude */
  momentum() {
    const s = this.speed();
    return gamma(s) * this.mass * s;
  }

  /** Relativistic kinetic energy */
  kineticEnergy() {
    return (gamma(this.speed()) - 1) * this.mass * C * C;
  }

  /** Apparent color after simplified Doppler shift */
  dopplerColor(observerAngle) {
    if (!chkDoppler.checked || this.number === 0) return this.color;
    const beta = this.speed() / C;
    // simplified: shift hue toward blue when approaching, red when receding
    const shift = beta * 120;  // degrees
    const movingAngle = Math.atan2(this.vy, this.vx);
    const rel = Math.cos(movingAngle - observerAngle); // +1 = approaching
    const hue = (this.baseHue - shift * rel + 360) % 360;
    return "hsl(" + hue + "," + Math.round(this.baseSat) + "%," + Math.round(this.baseVal * 0.7) + "%)";
  }

  update(dt) {
    if (!this.active) return;
    if (isNaN(this.x) || isNaN(this.y) || isNaN(this.vx) || isNaN(this.vy)) {
      this.vx = 0; this.vy = 0;
      this.active = false;
      return;
    }
    let speed = this.speed();

    // Advance rotation angle
    this.theta += this.omega * dt;

    if (speed < MIN_SPEED) { this.vx = 0; this.vy = 0; return; }

    // Record trail position if moving significantly
    if (speed > MIN_SPEED * 2) {
      this.history.push({ x: this.x, y: this.y });
      if (this.history.length > 45) this.history.shift();
    }

    // Apply friction to relativistic momentum, not velocity
    const dir = Vec.norm({ x: this.vx, y: this.vy });
    let momentum = gamma(speed) * this.mass * speed;
    momentum = Math.max(0, momentum - FRICTION * dt * this.mass * C);
    let newSpeed = momentum / Math.sqrt(this.mass * this.mass + (momentum * momentum) / (C * C));
    if (newSpeed < MIN_SPEED * 3) newSpeed = 0;
    newSpeed = clampSpeed(newSpeed);

    this.vx = dir.x * newSpeed;
    this.vy = dir.y * newSpeed;

    // Magnus effect: if moving AND spinning, rotate the velocity vector (preserves speed)
    if (newSpeed > 0 && Math.abs(this.omega) > 0.01) {
      const magnusAngle = MAGNUS_K * this.omega * dt;
      const cos_a = Math.cos(magnusAngle);
      const sin_a = Math.sin(magnusAngle);
      const newVx = this.vx * cos_a - this.vy * sin_a;
      const newVy = this.vx * sin_a + this.vy * cos_a;
      this.vx = newVx;
      this.vy = newVy;
    }

    // Spin friction: only decays when ball is moving linearly
    if (newSpeed > 0) {
      this.omega *= Math.max(0, 1 - SPIN_FRICTION * dt);
    }

    // Move
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }
}

// ── Pocket positions ──────────────────────────────────────
const POCKETS = [
  { x: CUSHION,             y: CUSHION },
  { x: TABLE_W / 2,         y: CUSHION - 4 },
  { x: TABLE_W - CUSHION,   y: CUSHION },
  { x: CUSHION,             y: TABLE_H - CUSHION },
  { x: TABLE_W / 2,         y: TABLE_H - CUSHION + 4 },
  { x: TABLE_W - CUSHION,   y: TABLE_H - CUSHION },
];

// ── Ball colors & layout ─────────────────────────────────
const BALL_COLORS = [
  "#ffffff",  // 0 cue
  "#f5d442",  // 1 yellow
  "#2255cc",  // 2 blue
  "#cc2222",  // 3 red
  "#6622aa",  // 4 purple
  "#ee7722",  // 5 orange
  "#228833",  // 6 green
  "#882222",  // 7 maroon
  "#111111",  // 8 black
  "#f5d442",  // 9 yellow stripe
  "#2255cc",  // 10 blue stripe
  "#cc2222",  // 11 red stripe
  "#6622aa",  // 12 purple stripe
  "#ee7722",  // 13 orange stripe
  "#228833",  // 14 green stripe
  "#882222",  // 15 maroon stripe
];

let balls = [];
let pocketed = [];
let cueMomentumHistory = [];

function rackPosition(row, col) {
  const startX = TABLE_W * 0.68;
  const startY = TABLE_H / 2;
  const gap = BALL_R * 2.15;
  return {
    x: startX + row * gap * Math.cos(Math.PI / 6),
    y: startY + col * gap + row * gap * Math.sin(Math.PI / 6) - row * gap * 0.5,
  };
}

function initBalls() {
  balls = [];
  pocketed = [];

  // Cue ball
  balls.push(new Ball(TABLE_W * 0.25, TABLE_H / 2, BALL_COLORS[0], 0, 1));

  // Rack (triangle)
  const rackOrder = [1, 2, 3, 8, 4, 5, 6, 7, 9, 10, 11, 12, 13, 14, 15];
  let idx = 0;
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col <= row; col++) {
      if (idx >= rackOrder.length) break;
      const num = rackOrder[idx++];
      const pos = rackPosition(row, col);
      balls.push(new Ball(pos.x, pos.y, BALL_COLORS[num], num, 1));
    }
  }
}

// ── Collision: ball ↔ wall ────────────────────────────────
function wallCollisions(ball) {
  const left   = CUSHION + ball.r;
  const right  = TABLE_W - CUSHION - ball.r;
  const top    = CUSHION + ball.r;
  const bottom = TABLE_H - CUSHION - ball.r;

  let hit = false;
  if (ball.x < left)   { ball.x = left;   ball.vx = -ball.vx; hit = true; }
  if (ball.x > right)  { ball.x = right;  ball.vx = -ball.vx; hit = true; }
  if (ball.y < top)    { ball.y = top;    ball.vy = -ball.vy; hit = true; }
  if (ball.y > bottom) { ball.y = bottom; ball.vy = -ball.vy; hit = true; }

  if (hit) {
    const speed = ball.speed();
    if (speed < MIN_SPEED) { ball.vx = 0; ball.vy = 0; return; }
    const p = gamma(speed) * ball.mass * speed;
    const p_new = p * RESTITUTION;
    // Inverse relativistic momentum formula: v = p / sqrt(m² + p²/c²)
    const v_new = p_new / Math.sqrt(ball.mass * ball.mass + (p_new * p_new) / (C * C));
    const scale = v_new / speed;
    ball.vx *= scale;
    ball.vy *= scale;
  }
}

// ── Elliptical hitbox: effective radius along a direction ──
function effectiveRadius(ball, nx, ny) {
  const speed = ball.speed();
  if (speed < MIN_SPEED) return ball.r;
  const g = gamma(speed);
  const a = ball.r / g;  // semi-axis along velocity (contracted)
  const b = ball.r;      // semi-axis perpendicular to velocity
  const velAngle = Math.atan2(ball.vy, ball.vx);
  const normAngle = Math.atan2(ny, nx);
  const alpha = normAngle - velAngle;
  const cosA = Math.cos(alpha);
  const sinA = Math.sin(alpha);
  return (a * b) / Math.sqrt(b * b * cosA * cosA + a * a * sinA * sinA);
}

// ── Dynamic gravity (spacetime curvature) ─────────────────
function applyGravity(a, b, dt) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  let dist = Math.sqrt(dx * dx + dy * dy);
  dist = Math.max(dist, BALL_R * 2);

  const v_eqA = Math.abs(a.omega) * a.r;
  const mKinA = (gamma(a.speed()) * gamma(v_eqA) - 1) * a.mass;
  const v_eqB = Math.abs(b.omega) * b.r;
  const mKinB = (gamma(b.speed()) * gamma(v_eqB) - 1) * b.mass;
  if (mKinA === 0 && mKinB === 0) return;

  const F = GRAVITY_G * mKinA * mKinB / (dist * dist);
  if (F === 0) return;

  const nx = dx / dist;
  const ny = dy / dist;

  // Apply force to ball a's momentum (toward b)
  const saA = a.speed();
  const pax = gamma(saA) * a.mass * a.vx + nx * F * dt;
  const pay = gamma(saA) * a.mass * a.vy + ny * F * dt;
  const paMag = Math.sqrt(pax * pax + pay * pay);
  if (paMag > 0) {
    const vaNew = clampSpeed(paMag / Math.sqrt(a.mass * a.mass + (paMag * paMag) / (C * C)));
    const paDir = Vec.norm({ x: pax, y: pay });
    a.vx = paDir.x * vaNew;
    a.vy = paDir.y * vaNew;
  }

  // Apply force to ball b's momentum (toward a)
  const saB = b.speed();
  const pbx = gamma(saB) * b.mass * b.vx - nx * F * dt;
  const pby = gamma(saB) * b.mass * b.vy - ny * F * dt;
  const pbMag = Math.sqrt(pbx * pbx + pby * pby);
  if (pbMag > 0) {
    const vbNew = clampSpeed(pbMag / Math.sqrt(b.mass * b.mass + (pbMag * pbMag) / (C * C)));
    const pbDir = Vec.norm({ x: pbx, y: pby });
    b.vx = pbDir.x * vbNew;
    b.vy = pbDir.y * vbNew;
  }
}

// ── Collision: ball ↔ ball (relativistic) ─────────────────
/**
 * Relativistic elastic collision between two balls.
 * We boost into the centre-of-momentum frame along the
 * collision axis, reverse the velocities along that axis
 * (elastic), then boost back.
 */
function resolveCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist === 0) return;

  // Unit normal & tangent
  const nx = dx / dist;
  const ny = dy / dist;

  // Elliptical hitbox check: effective radii along collision axis
  const rA = effectiveRadius(a, nx, ny);
  const rB = effectiveRadius(b, -nx, -ny);
  const minDist = rA + rB;
  if (dist > minDist) return;

  // Separate overlapping balls
  const overlap = minDist - dist;
  a.x -= nx * overlap * 0.5;
  a.y -= ny * overlap * 0.5;
  b.x += nx * overlap * 0.5;
  b.y += ny * overlap * 0.5;

  // Project velocities onto collision normal
  const va_n = a.vx * nx + a.vy * ny;
  const vb_n = b.vx * nx + b.vy * ny;

  // Tangential components (unchanged)
  const va_tx = a.vx - va_n * nx;
  const va_ty = a.vy - va_n * ny;
  const vb_tx = b.vx - vb_n * nx;
  const vb_ty = b.vy - vb_n * ny;

  // Only resolve if approaching
  if (va_n - vb_n <= 0) return;

  // ── Relativistic 1-D collision along normal ──
  const ma = a.mass;
  const mb = b.mass;
  const ga = gamma(a.speed());
  const gb = gamma(b.speed());

  // Total relativistic energy and momentum along normal
  const E_tot = ga * ma * C * C + gb * mb * C * C;
  const P_tot = ga * ma * va_n + gb * mb * vb_n;

  // Centre-of-momentum velocity (exact relativistic)
  const vcm = (P_tot * C * C) / E_tot;

  // Boost to CoM frame using Lorentz velocity addition
  const ua = (va_n - vcm) / (1 - (va_n * vcm) / (C * C));
  const ub = (vb_n - vcm) / (1 - (vb_n * vcm) / (C * C));

  // Elastic bounce in CoM frame
  const ua_after = -ua * RESTITUTION;
  const ub_after = -ub * RESTITUTION;

  // Boost back to lab frame using Lorentz velocity addition
  const va_n_new = (ua_after + vcm) / (1 + (ua_after * vcm) / (C * C));
  const vb_n_new = (ub_after + vcm) / (1 + (ub_after * vcm) / (C * C));

  // Clamp
  const va_n_clamped = Math.sign(va_n_new) * clampSpeed(Math.abs(va_n_new));
  const vb_n_clamped = Math.sign(vb_n_new) * clampSpeed(Math.abs(vb_n_new));

  // Recombine normal + tangent
  a.vx = va_n_clamped * nx + va_tx;
  a.vy = va_n_clamped * ny + va_ty;
  b.vx = vb_n_clamped * nx + vb_tx;
  b.vy = vb_n_clamped * ny + vb_ty;

  // Final speed clamp
  let sa = Vec.len({ x: a.vx, y: a.vy });
  if (sa > C * 0.9999) { const f = (C * 0.9999) / sa; a.vx *= f; a.vy *= f; }
  let sb = Vec.len({ x: b.vx, y: b.vy });
  if (sb > C * 0.9999) { const f = (C * 0.9999) / sb; b.vx *= f; b.vy *= f; }

  // ── Spin transfer from off-center (tangential) collision ──
  const tx = -ny;
  const ty = nx;
  const relVx = a.vx - b.vx;
  const relVy = a.vy - b.vy;
  const vTan = relVx * tx + relVy * ty;
  const omegaTransfer = SPIN_TRANSFER * vTan / BALL_R;
  a.omega += omegaTransfer;
  b.omega -= omegaTransfer;
  // Clamp spin: equatorial speed must not exceed 0.999c
  const maxOmega = 0.999 * C / BALL_R;
  a.omega = Math.max(-maxOmega, Math.min(maxOmega, a.omega));
  b.omega = Math.max(-maxOmega, Math.min(maxOmega, b.omega));

  // Bullet-time trigger on high-energy collisions
  if (chkBullet.checked) {
    const maxGamma = Math.max(ga, gb);
    if (maxGamma > 1.5) {
      timeScale = 0.05;
    }
  }
}

// ── Pocket check ──────────────────────────────────────────
function checkPockets() {
  for (const ball of balls) {
    if (!ball.active) continue;
    for (const p of POCKETS) {
      const d = Vec.len(Vec.sub(ball, p));
      if (d < POCKET_R) {
        ball.active = false;
        pocketed.push(ball.number);
        if (ball.number === 0) {
          // Re-spot cue ball
          setTimeout(() => {
            ball.x = TABLE_W * 0.25;
            ball.y = TABLE_H / 2;
            ball.vx = 0;
            ball.vy = 0;
            ball.omega = 0;
            ball.theta = 0;
            ball.active = true;
          }, 600);
        }
      }
    }
  }
}

// ── Cue aiming state ─────────────────────────────────────
let aiming = false;
let aimStart = { x: 0, y: 0 };
let aimEnd   = { x: 0, y: 0 };

function canvasMouse(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function cueBall() {
  return balls.find(b => b.number === 0 && b.active);
}

function allStopped() {
  return balls.every(b => !b.active || isNaN(b.speed()) || b.speed() < MIN_SPEED);
}

canvas.addEventListener("mousedown", (e) => {
  if (!allStopped()) return;
  const cue = cueBall();
  if (!cue) return;
  const m = canvasMouse(e);
  aiming = true;
  aimStart = m;
  aimEnd   = m;
  cueMomentumHistory = [];
});

window.addEventListener("mousemove", (e) => {
  if (!aiming) return;
  aimEnd = canvasMouse(e);
});

window.addEventListener("mouseup", () => {
  if (!aiming) return;
  aiming = false;
  const cue = cueBall();
  if (!cue) return;

  const dx = aimEnd.x - cue.x;
  const dy = aimEnd.y - cue.y;
  const pullDist = Vec.len({ x: dx, y: dy });
  const beta = 1 - Math.exp(-pullDist / 100);
  const power = Math.min(beta * C, C * 0.999);
  if (power < 2) return;

  const dir = Vec.norm({ x: dx, y: dy });
  cue.vx = dir.x * power;
  cue.vy = dir.y * power;
});

// ── Slider ────────────────────────────────────────────────
sliderC.addEventListener("input", () => {
  C = Number(sliderC.value);
  valC.textContent = C;
});

btnReset.addEventListener("click", () => { initBalls(); });

// ── Drawing helpers ───────────────────────────────────────
const GRID_WARP_STRENGTH   = 500000;  // how strongly balls pull grid points
const GRID_WARP_SMOOTHING  = 5000;  // softening factor to avoid singularity at dist=0

function gridWarp(x, y, activeBalls) {
  let ox = 0, oy = 0;
  for (const ball of activeBalls) {
    const dx = ball.x - x, dy = ball.y - y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const v_eq = Math.abs(ball.omega) * ball.r;
    const gamma_rot = gamma(v_eq);
    const total_gamma = gamma(ball.speed()) * gamma_rot;
    const relMass = (total_gamma - 1) * ball.mass;
    const pull = relMass * GRID_WARP_STRENGTH / (dist * dist + GRID_WARP_SMOOTHING);
    ox += (dx / dist) * pull;
    oy += (dy / dist) * pull;
  }
  return { ox, oy };
}

function drawGrid() {
  if (!chkGrid.checked) return;
  const SPACING = 40;
  const activeBalls = balls.filter(b => b.active);
  ctx.strokeStyle = "rgba(100,255,120,0.12)";
  ctx.lineWidth = 0.5;

  // Draw horizontal lines
  for (let y = CUSHION; y <= TABLE_H - CUSHION; y += SPACING) {
    ctx.beginPath();
    for (let x = CUSHION; x <= TABLE_W - CUSHION; x += 4) {
      const { ox, oy } = gridWarp(x, y, activeBalls);
      if (x === CUSHION) ctx.moveTo(x + ox, y + oy);
      else ctx.lineTo(x + ox, y + oy);
    }
    ctx.stroke();
  }

  // Draw vertical lines
  for (let x = CUSHION; x <= TABLE_W - CUSHION; x += SPACING) {
    ctx.beginPath();
    for (let y = CUSHION; y <= TABLE_H - CUSHION; y += 4) {
      const { ox, oy } = gridWarp(x, y, activeBalls);
      if (y === CUSHION) ctx.moveTo(x + ox, y + oy);
      else ctx.lineTo(x + ox, y + oy);
    }
    ctx.stroke();
  }
}

function drawTable() {
  // Felt
  ctx.fillStyle = "#0b6623";
  ctx.fillRect(0, 0, TABLE_W, TABLE_H);

  // Cushions
  ctx.fillStyle = "#3d2b1f";
  ctx.fillRect(0, 0, TABLE_W, CUSHION);
  ctx.fillRect(0, TABLE_H - CUSHION, TABLE_W, CUSHION);
  ctx.fillRect(0, 0, CUSHION, TABLE_H);
  ctx.fillRect(TABLE_W - CUSHION, 0, CUSHION, TABLE_H);

  // Inner cushion edge
  ctx.strokeStyle = "#5a3d2b";
  ctx.lineWidth = 2;
  ctx.strokeRect(CUSHION, CUSHION, TABLE_W - 2 * CUSHION, TABLE_H - 2 * CUSHION);

  // Pockets
  for (const p of POCKETS) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI * 2);
    ctx.fillStyle = "#111";
    ctx.fill();
  }

  // Head string
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.beginPath();
  ctx.moveTo(TABLE_W * 0.33, CUSHION);
  ctx.lineTo(TABLE_W * 0.33, TABLE_H - CUSHION);
  ctx.stroke();
  ctx.setLineDash([]);

  // Spacetime grid overlay
  drawGrid();
}

function spinPerimeterColor(omega, r) {
  const vEq = Math.abs(omega) * r;
  const ratio = vEq / C;
  if (ratio < 0.5) {
    const alpha = ratio / 0.5 * 0.2;
    return "rgba(255,255,255," + alpha.toFixed(3) + ")";
  } else if (ratio < 0.9) {
    const t = (ratio - 0.5) / 0.4;
    const alpha = 0.2 + t * 0.8;
    return "rgba(255,255,255," + alpha.toFixed(3) + ")";
  } else if (ratio < 0.95) {
    const t = (ratio - 0.9) / 0.05;
    const g = Math.round(255 * (1 - t) + 165 * t);
    const bl = Math.round(255 * (1 - t));
    return "rgba(255," + g + "," + bl + ",1.0)";
  } else if (ratio < 0.99) {
    const t = (ratio - 0.95) / 0.04;
    const g = Math.round(165 * (1 - t));
    return "rgba(255," + g + ",0,1.0)";
  }
  return "rgba(255,0,0,1.0)";
}

function drawBall(ball) {
  if (!ball.active) return;

  const speed = ball.speed();
  const g = gamma(speed);
  const showContraction = chkContraction.checked;

  // Doppler color: observer assumed at centre of table
  const obsAngle = Math.atan2(TABLE_H / 2 - ball.y, TABLE_W / 2 - ball.x);
  const col = ball.dopplerColor(obsAngle);

  ctx.save();
  ctx.translate(ball.x, ball.y);

  // Draw relativistic trail
  if (ball.history.length > 1) {
    ctx.save();
    ctx.translate(-ball.x, -ball.y);  // back to world coords
    for (let i = 1; i < ball.history.length; i++) {
      const alpha = (i / ball.history.length) * 0.5;
      ctx.beginPath();
      ctx.moveTo(ball.history[i - 1].x, ball.history[i - 1].y);
      ctx.lineTo(ball.history[i].x, ball.history[i].y);
      ctx.strokeStyle = ball.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  if (showContraction && speed > 2) {
    // Length contraction: shrink along velocity direction
    const angle = Math.atan2(ball.vy, ball.vx);
    ctx.rotate(angle);
    const contractFactor = 1 / g;  // Lorentz contraction factor
    ctx.scale(contractFactor, 1);
    ctx.rotate(-angle);
  }

  // Apply spin rotation for inner details
  ctx.rotate(ball.theta);

  // Shadow
  ctx.beginPath();
  ctx.arc(1, 1, ball.r + 1, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fill();

  // Ball body
  ctx.beginPath();
  ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = col;
  ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.5)";
  ctx.lineWidth = 1;
  ctx.stroke();

  // Highlight
  ctx.beginPath();
  ctx.arc(-ball.r * 0.3, -ball.r * 0.3, ball.r * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fill();

  // Number label
  if (ball.number > 0) {
    // Stripe band for balls 9-15
    if (ball.number >= 9) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
      ctx.clip();
      ctx.beginPath();
      ctx.rect(-ball.r, -ball.r * 0.35, ball.r * 2, ball.r * 0.7);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = ball.number >= 9 ? "#000" : "#fff";
    if (ball.number === 8) ctx.fillStyle = "#fff";
    ctx.font = "bold 9px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(ball.number, 0, 0);
  }

  // Dashed spin perimeter on the contracted ellipse
  if (ball.omega !== 0) {
    ctx.beginPath();
    ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
    ctx.setLineDash([6, 6]);
    ctx.lineWidth = 3;
    ctx.strokeStyle = spinPerimeterColor(ball.omega, ball.r);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();

  // Speed indicator ring for fast-moving balls
  if (speed > C * 0.3) {
    const alpha = Math.min((speed / C - 0.3) / 0.7, 1);
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(100,180,255," + (alpha * 0.6) + ")";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Pulsing ready indicator for cue ball
  if (ball.number === 0 && allStopped()) {
    const pulseAlpha = 0.3 + 0.3 * Math.sin(Date.now() / 200);
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r + 6, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,200," + pulseAlpha + ")";
    ctx.lineWidth = 3;
    ctx.stroke();
  }
}

function drawCue() {
  if (!aiming) return;
  const cue = cueBall();
  if (!cue) return;

  const dx = aimEnd.x - cue.x;
  const dy = aimEnd.y - cue.y;
  const pullDist = Vec.len({ x: dx, y: dy });
  const dir = Vec.norm({ x: dx, y: dy });

  // Asymptotic power scaling
  const beta = 1 - Math.exp(-pullDist / 100);
  const power = Math.min(beta * C, C * 0.999);
  const powerFrac = power / (C * 0.999);

  // Glowing forward-pointing vector arrow from cue ball toward cursor
  const arrowLen = 40 + powerFrac * 180;
  const tipX = cue.x + dir.x * (BALL_R + arrowLen);
  const tipY = cue.y + dir.y * (BALL_R + arrowLen);
  const baseX = cue.x + dir.x * (BALL_R + 4);
  const baseY = cue.y + dir.y * (BALL_R + 4);

  // Arrow shaft glow
  ctx.save();
  ctx.shadowColor = "rgba(100,200,255,0.8)";
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(baseX, baseY);
  ctx.lineTo(tipX, tipY);
  ctx.strokeStyle = "rgba(100,200,255," + (0.5 + powerFrac * 0.5) + ")";
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();

  // Arrowhead
  const headLen = 14;
  const headAngle = Math.PI / 6;
  const angle = Math.atan2(dy, dx);
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - headLen * Math.cos(angle - headAngle), tipY - headLen * Math.sin(angle - headAngle));
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - headLen * Math.cos(angle + headAngle), tipY - headLen * Math.sin(angle + headAngle));
  ctx.strokeStyle = "rgba(100,200,255," + (0.6 + powerFrac * 0.4) + ")";
  ctx.lineWidth = 3;
  ctx.stroke();

  // Aiming dotted line extending further
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(cue.x + dir.x * 400, cue.y + dir.y * 400);
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);

  // Power bar
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(TABLE_W - 30, CUSHION, 14, TABLE_H - 2 * CUSHION);
  const barH = (TABLE_H - 2 * CUSHION) * powerFrac;
  const r = Math.round(255 * powerFrac);
  const g = Math.round(255 * (1 - powerFrac));
  ctx.fillStyle = "rgb(" + r + "," + g + ",0)";
  ctx.fillRect(TABLE_W - 30, TABLE_H - CUSHION - barH, 14, barH);
  ctx.font = "9px sans-serif";
  ctx.fillStyle = "#fff";
  ctx.textAlign = "center";
  ctx.fillText((power / C).toFixed(3) + "c", TABLE_W - 23, TABLE_H - CUSHION + 12);
}

function drawHUD() {
  const cue = cueBall();
  if (!cue) return;
  const speed = cue.speed();
  const g = gamma(speed);
  const beta = speed / C;

  ctx.font = "11px monospace";
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.textAlign = "left";
  ctx.fillText("Cue: v=" + speed.toFixed(1) + " px/s  β=" + beta.toFixed(4) +
               "  γ=" + g.toFixed(4) + "  p=" + cue.momentum().toFixed(1), CUSHION + 4, TABLE_H - 6);

  // Pocketed count
  ctx.textAlign = "right";
  ctx.fillText("Pocketed: " + pocketed.filter(n => n > 0).length + "/15  c=" + C + " px/s",
               TABLE_W - CUSHION - 4, TABLE_H - 6);
}

function drawGraph() {
  if (cueMomentumHistory.length < 2) return;
  const gw = 250, gh = 150;
  const gx = TABLE_W - gw - 20;
  const gy = TABLE_H - gh - 30;

  // Background
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(gx, gy, gw, gh);
  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  ctx.lineWidth = 1;
  ctx.strokeRect(gx, gy, gw, gh);

  // Label
  ctx.font = "10px monospace";
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.textAlign = "left";
  ctx.fillText("Cue Momentum (γmv)", gx + 6, gy + 12);

  // Auto-scale Y
  let maxP = 0;
  for (let i = 0; i < cueMomentumHistory.length; i++) {
    if (cueMomentumHistory[i] > maxP) maxP = cueMomentumHistory[i];
  }
  if (maxP === 0) maxP = 1;

  // Plot
  const pad = 4;
  const plotW = gw - pad * 2;
  const plotH = gh - 20;
  ctx.beginPath();
  for (let i = 0; i < cueMomentumHistory.length; i++) {
    const px = gx + pad + (i / Math.max(cueMomentumHistory.length - 1, 1)) * plotW;
    const py = gy + gh - pad - (cueMomentumHistory[i] / maxP) * plotH;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = "rgba(100,200,255,0.9)";
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// ── Game loop ─────────────────────────────────────────────
let lastTime = 0;
let lastInfoUpdate = 0;
const INFO_UPDATE_INTERVAL = 100; // ms between info panel updates
const SUB_STEPS = 4;  // physics sub-steps per frame

function gameLoop(timestamp) {
  const realDt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Smoothly recover timeScale toward 1.0
  if (timeScale < 1.0) {
    timeScale += (1.0 - timeScale) * 2.0 * realDt;
    if (timeScale > 0.99) timeScale = 1.0;
  }

  const dt = realDt * timeScale;
  const subDt = dt / SUB_STEPS;

  for (let step = 0; step < SUB_STEPS; step++) {
    // Dynamic gravity between all active balls
    for (let i = 0; i < balls.length; i++) {
      if (!balls[i].active) continue;
      for (let j = i + 1; j < balls.length; j++) {
        if (!balls[j].active) continue;
        applyGravity(balls[i], balls[j], subDt);
      }
    }
    for (const ball of balls) {
      if (ball.active) ball.update(subDt);
    }
    // Ball–ball collisions
    for (let i = 0; i < balls.length; i++) {
      if (!balls[i].active) continue;
      for (let j = i + 1; j < balls.length; j++) {
        if (!balls[j].active) continue;
        resolveCollision(balls[i], balls[j]);
      }
    }
    // Wall collisions
    for (const ball of balls) {
      if (ball.active) wallCollisions(ball);
    }
    checkPockets();
  }

  // Record cue ball momentum for graph
  if (!allStopped()) {
    const cue = cueBall();
    if (cue) {
      cueMomentumHistory.push(cue.momentum());
      if (cueMomentumHistory.length > 300) cueMomentumHistory.shift();
    }
  }

  // ── Draw ──
  drawTable();
  for (const ball of balls) drawBall(ball);
  drawCue();
  drawHUD();
  drawGraph();

  // Info panel update (throttled)
  if (timestamp - lastInfoUpdate > INFO_UPDATE_INTERVAL) {
    lastInfoUpdate = timestamp;
    const moving = balls.filter(b => b.active && b.speed() > MIN_SPEED);
    if (moving.length > 0) {
      const fastest = moving.reduce((a, b) => a.speed() > b.speed() ? a : b);
      const fs = fastest.speed();
      infoPanel.textContent =
        "Fastest ball #" + fastest.number + ": v=" + fs.toFixed(1) +
        " β=" + (fs / C).toFixed(3) + " γ=" + gamma(fs).toFixed(3) +
        " | Contraction factor: " + (1 / gamma(fs)).toFixed(3);
    } else {
      infoPanel.textContent = "All balls at rest. Click & drag the cue ball to shoot.";
    }
  }

  requestAnimationFrame(gameLoop);
}

// ── Automated Physics Tests ──────────────────────────────
function runPhysicsTests() {
  console.log("=== Relativistic Billiards: Physics Tests ===");
  let passed = 0;
  let failed = 0;

  // Test 1: gamma(0.6 * C) should be exactly 1.25
  const testSpeed = 0.6 * C;
  const g = gamma(testSpeed);
  const gammaExpected = 1.25;
  if (Math.abs(g - gammaExpected) < 0.0001) {
    console.log("PASS: Test 1 – gamma(0.6c) = " + g + " (expected " + gammaExpected + ")");
    passed++;
  } else {
    console.log("FAIL: Test 1 – gamma(0.6c) = " + g + " (expected " + gammaExpected + ")");
    failed++;
  }

  // Test 2: Conservation of energy and momentum in a collision
  // Ball a at 0.8c, ball b at rest, both mass 1
  const va_n = 0.8 * C;
  const vb_n = 0.0;
  const ma = 1;
  const mb = 1;
  const ga_before = gamma(Math.abs(va_n));
  const gb_before = gamma(Math.abs(vb_n));
  const E_before = ga_before * ma * C * C + gb_before * mb * C * C;
  const P_before = ga_before * ma * va_n + gb_before * mb * vb_n;

  // Run collision logic (same as resolveCollision along normal)
  const E_tot = E_before;
  const P_tot = P_before;
  const vcm = (P_tot * C * C) / E_tot;
  const ua = (va_n - vcm) / (1 - (va_n * vcm) / (C * C));
  const ub = (vb_n - vcm) / (1 - (vb_n * vcm) / (C * C));
  // Fully elastic (RESTITUTION = 1 for test)
  const ua_after = -ua;
  const ub_after = -ub;
  const va_after = (ua_after + vcm) / (1 + (ua_after * vcm) / (C * C));
  const vb_after = (ub_after + vcm) / (1 + (ub_after * vcm) / (C * C));

  const ga_after = gamma(Math.abs(va_after));
  const gb_after = gamma(Math.abs(vb_after));
  const E_after = ga_after * ma * C * C + gb_after * mb * C * C;
  const P_after = ga_after * ma * va_after + gb_after * mb * vb_after;

  const E_diff = Math.abs(E_before - E_after) / E_before;
  const P_diff = Math.abs(P_before - P_after) / (Math.abs(P_before) || 1);

  if (E_diff < 0.0001) {
    console.log("PASS: Test 2a – Energy conserved: E_before=" + E_before.toFixed(4) + " E_after=" + E_after.toFixed(4) + " (rel diff=" + E_diff.toExponential(2) + ")");
    passed++;
  } else {
    console.log("FAIL: Test 2a – Energy NOT conserved: E_before=" + E_before.toFixed(4) + " E_after=" + E_after.toFixed(4) + " (rel diff=" + E_diff.toExponential(2) + ")");
    failed++;
  }

  if (P_diff < 0.0001) {
    console.log("PASS: Test 2b – Momentum conserved: P_before=" + P_before.toFixed(4) + " P_after=" + P_after.toFixed(4) + " (rel diff=" + P_diff.toExponential(2) + ")");
    passed++;
  } else {
    console.log("FAIL: Test 2b – Momentum NOT conserved: P_before=" + P_before.toFixed(4) + " P_after=" + P_after.toFixed(4) + " (rel diff=" + P_diff.toExponential(2) + ")");
    failed++;
  }

  // Test 3: Click anywhere to aim (no distance check)
  // Verify that mousedown handler does not require proximity to cue ball
  if (typeof allStopped === "function") {
    console.log("PASS: Test 3 – Click anywhere aiming: allStopped function exists for gating");
    passed++;
  } else {
    console.log("FAIL: Test 3 – allStopped function missing");
    failed++;
  }

  // Test 4: Ball history array exists and respects size limit
  const testBall = new Ball(400, 400, "#ff0000", 99, 1);
  testBall.vx = 100;
  testBall.vy = 0;
  // Simulate 60 update calls to exceed the 45-entry cap
  for (let i = 0; i < 60; i++) {
    testBall.x += 1;
    if (testBall.speed() > MIN_SPEED * 2) {
      testBall.history.push({ x: testBall.x, y: testBall.y });
      if (testBall.history.length > 45) testBall.history.shift();
    }
  }
  if (testBall.history.length === 45) {
    console.log("PASS: Test 4a – Ball history capped at 45 entries");
    passed++;
  } else {
    console.log("FAIL: Test 4a – Ball history length = " + testBall.history.length + " (expected 45)");
    failed++;
  }

  // Test 5: timeScale variable exists and defaults to 1.0
  if (timeScale === 1.0) {
    console.log("PASS: Test 5 – timeScale defaults to 1.0");
    passed++;
  } else {
    console.log("FAIL: Test 5 – timeScale = " + timeScale + " (expected 1.0)");
    failed++;
  }

  // Test 6: Bullet time triggers when gamma > 1.5
  const savedTimeScale = timeScale;
  const savedChecked = chkBullet.checked;
  chkBullet.checked = true;
  timeScale = 1.0;
  // Verify the trigger condition: gamma at 0.75c exceeds threshold of 1.5
  const bulletTestSpeed = 0.75 * C;
  const bulletGamma = gamma(bulletTestSpeed);
  if (bulletGamma > 1.5) {
    // Simulate what resolveCollision does: set timeScale = 0.05
    timeScale = 0.05;
  }
  if (timeScale === 0.05) {
    console.log("PASS: Test 6 – Bullet time triggered (gamma=" + bulletGamma.toFixed(3) + " > 1.5, timeScale=" + timeScale + ")");
    passed++;
  } else {
    console.log("FAIL: Test 6 – Bullet time not triggered (gamma=" + bulletGamma.toFixed(3) + ", timeScale=" + timeScale + ")");
    failed++;
  }
  timeScale = savedTimeScale;
  chkBullet.checked = savedChecked;

  // Test 7: drawGrid function exists
  if (typeof drawGrid === "function") {
    console.log("PASS: Test 7 – drawGrid function exists");
    passed++;
  } else {
    console.log("FAIL: Test 7 – drawGrid function missing");
    failed++;
  }

  // Test 8: gridWarp returns zero displacement for stationary balls (kinetic-energy-only warp)
  const stationaryBall = new Ball(400, 400, "#ff0000", 99, 1);
  stationaryBall.vx = 0;
  stationaryBall.vy = 0;
  const warp = gridWarp(300, 300, [stationaryBall]);
  if (warp.ox === 0 && warp.oy === 0) {
    console.log("PASS: Test 8 – gridWarp returns zero for stationary ball");
    passed++;
  } else {
    console.log("FAIL: Test 8 – gridWarp returned non-zero for stationary ball: ox=" + warp.ox + " oy=" + warp.oy);
    failed++;
  }

  // Test 9: NaN safety net deactivates ball
  const nanBall = new Ball(400, 400, "#ff0000", 98, 1);
  nanBall.vx = NaN;
  nanBall.vy = 100;
  nanBall.active = true;
  nanBall.update(0.016);
  if (!nanBall.active && nanBall.vx === 0 && nanBall.vy === 0) {
    console.log("PASS: Test 9 – NaN safety net deactivates ball and zeroes velocity");
    passed++;
  } else {
    console.log("FAIL: Test 9 – NaN safety net did not work: active=" + nanBall.active + " vx=" + nanBall.vx + " vy=" + nanBall.vy);
    failed++;
  }

  // Test 10: allStopped returns true when ball has NaN speed
  const savedBalls = balls;
  const nanBall2 = new Ball(400, 400, "#ff0000", 97, 1);
  nanBall2.vx = NaN;
  nanBall2.vy = NaN;
  nanBall2.active = true;
  balls = [nanBall2];
  if (allStopped()) {
    console.log("PASS: Test 10 – allStopped returns true for NaN-speed ball");
    passed++;
  } else {
    console.log("FAIL: Test 10 – allStopped returned false for NaN-speed ball");
    failed++;
  }
  balls = savedBalls;

  // Test 11: Asymptotic power scaling approaches but never exceeds 0.999c
  const testPullDist = 10000; // very large drag
  const testBeta = 1 - Math.exp(-testPullDist / 100);
  const testPower = Math.min(testBeta * C, C * 0.999);
  if (testPower <= C * 0.999 && testPower > C * 0.99) {
    console.log("PASS: Test 11 – Asymptotic power scaling: power=" + testPower.toFixed(2) + " (max=" + (C * 0.999).toFixed(2) + ")");
    passed++;
  } else {
    console.log("FAIL: Test 11 – Asymptotic power out of range: power=" + testPower.toFixed(2));
    failed++;
  }

  // Test 12: cueMomentumHistory array and drawGraph function exist
  if (Array.isArray(cueMomentumHistory) && typeof drawGraph === "function") {
    console.log("PASS: Test 12 – cueMomentumHistory array and drawGraph function exist");
    passed++;
  } else {
    console.log("FAIL: Test 12 – cueMomentumHistory or drawGraph missing");
    failed++;
  }

  // Test 13: GRID_WARP_STRENGTH is 500000
  if (GRID_WARP_STRENGTH === 500000) {
    console.log("PASS: Test 13 – GRID_WARP_STRENGTH = 500000");
    passed++;
  } else {
    console.log("FAIL: Test 13 – GRID_WARP_STRENGTH = " + GRID_WARP_STRENGTH + " (expected 500000)");
    failed++;
  }

  // Test 14: GRAVITY_G constant is 15000
  if (GRAVITY_G === 15000) {
    console.log("PASS: Test 14 – GRAVITY_G = 15000");
    passed++;
  } else {
    console.log("FAIL: Test 14 – GRAVITY_G = " + GRAVITY_G + " (expected 15000)");
    failed++;
  }

  // Test 15: Ball has omega and theta properties
  const spinBall = new Ball(400, 400, "#ff0000", 50, 1);
  if (spinBall.omega === 0 && spinBall.theta === 0) {
    console.log("PASS: Test 15 – Ball has omega=0 and theta=0 by default");
    passed++;
  } else {
    console.log("FAIL: Test 15 – omega=" + spinBall.omega + " theta=" + spinBall.theta);
    failed++;
  }

  // Test 16: effectiveRadius returns ball.r for stationary ball
  const stBall = new Ball(400, 400, "#ff0000", 51, 1);
  const er = effectiveRadius(stBall, 1, 0);
  if (er === BALL_R) {
    console.log("PASS: Test 16 – effectiveRadius returns BALL_R for stationary ball");
    passed++;
  } else {
    console.log("FAIL: Test 16 – effectiveRadius returned " + er + " (expected " + BALL_R + ")");
    failed++;
  }

  // Test 17: effectiveRadius contracts along velocity direction
  const fastBall = new Ball(400, 400, "#ff0000", 52, 1);
  fastBall.vx = 0.9 * C;
  fastBall.vy = 0;
  const erAlong = effectiveRadius(fastBall, 1, 0);  // along velocity
  const erPerp = effectiveRadius(fastBall, 0, 1);   // perpendicular to velocity
  if (erAlong < BALL_R && Math.abs(erPerp - BALL_R) < 0.01) {
    console.log("PASS: Test 17 – effectiveRadius: along=" + erAlong.toFixed(3) + " perp=" + erPerp.toFixed(3));
    passed++;
  } else {
    console.log("FAIL: Test 17 – effectiveRadius: along=" + erAlong.toFixed(3) + " perp=" + erPerp.toFixed(3));
    failed++;
  }

  // Test 18: Spin is clamped so equatorial speed < 0.999c
  const clampBall = new Ball(400, 400, "#ff0000", 53, 1);
  clampBall.omega = 9999999;
  const maxOmegaTest = 0.999 * C / BALL_R;
  clampBall.omega = Math.min(clampBall.omega, maxOmegaTest);
  const eqSpeed = Math.abs(clampBall.omega) * BALL_R;
  if (eqSpeed <= 0.999 * C + 0.01) {
    console.log("PASS: Test 18 – Spin clamped: eqSpeed=" + eqSpeed.toFixed(2) + " < " + (0.999 * C).toFixed(2));
    passed++;
  } else {
    console.log("FAIL: Test 18 – Spin NOT clamped: eqSpeed=" + eqSpeed.toFixed(2));
    failed++;
  }

  // Test 19: applyGravity produces zero force for stationary balls
  const gBallA = new Ball(200, 400, "#ff0000", 54, 1);
  const gBallB = new Ball(600, 400, "#0000ff", 55, 1);
  gBallA.vx = 0; gBallA.vy = 0;
  gBallB.vx = 0; gBallB.vy = 0;
  applyGravity(gBallA, gBallB, 0.016);
  if (gBallA.vx === 0 && gBallA.vy === 0 && gBallB.vx === 0 && gBallB.vy === 0) {
    console.log("PASS: Test 19 – applyGravity: no force between stationary balls");
    passed++;
  } else {
    console.log("FAIL: Test 19 – applyGravity moved stationary balls: a.vx=" + gBallA.vx + " b.vx=" + gBallB.vx);
    failed++;
  }

  // Test 19b: applyGravity attracts relativistic balls toward each other
  const gBallC = new Ball(200, 400, "#ff0000", 56, 1);
  const gBallD = new Ball(600, 400, "#0000ff", 57, 1);
  gBallC.vx = 0; gBallC.vy = 0.8 * C;
  gBallD.vx = 0; gBallD.vy = -0.8 * C;
  const cVxBefore = gBallC.vx;
  const dVxBefore = gBallD.vx;
  applyGravity(gBallC, gBallD, 0.016);
  // Ball C should be pulled toward D (positive x direction), Ball D pulled toward C (negative x direction)
  if (gBallC.vx > cVxBefore && gBallD.vx < dVxBefore) {
    console.log("PASS: Test 19b – applyGravity: relativistic balls attract (C.vx=" + gBallC.vx.toFixed(4) + " D.vx=" + gBallD.vx.toFixed(4) + ")");
    passed++;
  } else {
    console.log("FAIL: Test 19b – applyGravity: C.vx=" + gBallC.vx.toFixed(4) + " D.vx=" + gBallD.vx.toFixed(4));
    failed++;
  }

  // Test 20: spinPerimeterColor returns nearly transparent for low spin
  const lowSpinColor = spinPerimeterColor(0.1, BALL_R);
  if (lowSpinColor.indexOf("rgba(255,255,255,") === 0) {
    console.log("PASS: Test 20 – spinPerimeterColor returns white-based for low spin: " + lowSpinColor);
    passed++;
  } else {
    console.log("FAIL: Test 20 – spinPerimeterColor unexpected: " + lowSpinColor);
    failed++;
  }

  // Test 21: Spin does not decay when ball is stationary
  const stillSpinBall = new Ball(400, 400, "#ff0000", 56, 1);
  stillSpinBall.omega = 5.0;
  stillSpinBall.vx = 0;
  stillSpinBall.vy = 0;
  stillSpinBall.update(0.016);
  if (stillSpinBall.omega === 5.0) {
    console.log("PASS: Test 21 – Spin preserved when ball is stationary (omega=" + stillSpinBall.omega + ")");
    passed++;
  } else {
    console.log("FAIL: Test 21 – Spin decayed on stationary ball: omega=" + stillSpinBall.omega);
    failed++;
  }

  // Test 22: Spin decays when ball is moving
  const movingSpinBall = new Ball(400, 400, "#ff0000", 57, 1);
  movingSpinBall.omega = 5.0;
  movingSpinBall.vx = 100;
  movingSpinBall.vy = 0;
  const omegaBefore = movingSpinBall.omega;
  movingSpinBall.update(0.1);
  if (movingSpinBall.omega < omegaBefore) {
    console.log("PASS: Test 22 – Spin decays when moving (before=" + omegaBefore + " after=" + movingSpinBall.omega.toFixed(4) + ")");
    passed++;
  } else {
    console.log("FAIL: Test 22 – Spin did not decay: before=" + omegaBefore + " after=" + movingSpinBall.omega);
    failed++;
  }

  console.log("=== Results: " + passed + " passed, " + failed + " failed ===");
}

// ── Start ─────────────────────────────────────────────────
runPhysicsTests();
initBalls();
requestAnimationFrame(gameLoop);
</script>
